<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/timer.css">
    <title>Timer</title>
</head>
<body>
   <div class="header-con">
    <div class="prevtab"><a href="javascript:history.back()"><svg xmlns="http://www.w3.org/2000/svg" height="32px" viewBox="0 -960 960 960" width="37px" fill="rgba(45, 46, 46, 0.842)"><path d="M560-240 320-480l240-240 56 56-184 184 184 184-56 56Z"/></svg></a></div>
    <h3 id="timerheader">Timer</h3>
   </div>
 <div class="timer-container">
    <h2 id="timer-box"></h2>

 </div>

 <div class="buttons">
    <button id="new-timer"><svg xmlns="http://www.w3.org/2000/svg" height="28px" viewBox="0 -960 960 960" width="30px" fill="green"><path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/></svg>new</button>
    <button id="play-pause"><svg xmlns="http://www.w3.org/2000/svg" height="35px" viewBox="0 -960 960 960" width="34px" fill="white"><path d="M320-200v-560l440 280-440 280Zm80-280Zm0 134 210-134-210-134v268Z"/></svg></button>
    <button id="alarm"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#000000"><path d="M339.5-108.5q-65.5-28.5-114-77t-77-114Q120-365 120-440t28.5-140.5q28.5-65.5 77-114t114-77Q405-800 480-800t140.5 28.5q65.5 28.5 114 77t77 114Q840-515 840-440t-28.5 140.5q-28.5 65.5-77 114t-114 77Q555-80 480-80t-140.5-28.5ZM480-440Zm112 168 56-56-128-128v-184h-80v216l152 152ZM224-866l56 56-170 170-56-56 170-170Zm512 0 170 170-56 56-170-170 56-56ZM480-160q117 0 198.5-81.5T760-440q0-117-81.5-198.5T480-720q-117 0-198.5 81.5T200-440q0 117 81.5 198.5T480-160Z"/></svg></button>
 </div>

 <dialog id="new-timerbox">
   <div class="container">
   <div class="sec-con">Sec<input type="number" min="0" max="59" id="timer-sec"></div>
   <div class="min-con">Min<input type="number" min="0" max="59" id="timer-min"></div>
   <div class="hr-con">Hr<input type="number" min="0" max="12" id="timer-hr"></div>
   </div>
   <div class="button"><button id="cancle">
   <svg xmlns="http://www.w3.org/2000/svg" id="close" height="28px" viewBox="0 -960 960 960" width="28px" fill="white"><path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/></svg>
   </button>
   <button id="add">Set Timer</button>
   </div>
 </dialog>
<script src="script/timer.js"></script>
</body>
</html>
